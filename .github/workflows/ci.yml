name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libseccomp-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libseccomp-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libseccomp-dev pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude sandbox

  integration:
    runs-on: ubuntu-latest
    needs: [build, test-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libseccomp-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

      - name: MCP server responds to initialize
        run: |
          REQUEST='{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}},"id":1}'
          LEN=${#REQUEST}
          RESPONSE=$(printf "Content-Length: %d\r\n\r\n%s" "$LEN" "$REQUEST" | timeout 5 ./target/debug/sandbox-mcp 2>/dev/null)
          echo "$RESPONSE" | grep -q '"jsonrpc":"2.0"' || exit 1
          echo "$RESPONSE" | grep -q 'sandbox-mcp' || exit 1
          echo "✅ initialize OK"

      - name: MCP server lists 6 tools
        run: |
          REQUEST='{"jsonrpc":"2.0","method":"tools/list","params":{},"id":2}'
          LEN=${#REQUEST}
          RESPONSE=$(printf "Content-Length: %d\r\n\r\n%s" "$LEN" "$REQUEST" | timeout 5 ./target/debug/sandbox-mcp 2>/dev/null)
          for tool in sandbox_execute sandbox_rollback sandbox_list_sessions sandbox_clear_session sandbox_policy_check sandbox_scan; do
            echo "$RESPONSE" | grep -q "$tool" || { echo "❌ Missing tool: $tool"; exit 1; }
          done
          echo "✅ All 6 tools listed"

      - name: MCP sandbox_scan detects threats
        run: |
          REQUEST='{"jsonrpc":"2.0","method":"tools/call","params":{"name":"sandbox_scan","arguments":{"code":"import os\nos.system(\"rm -rf /\")"}},"id":3}'
          LEN=${#REQUEST}
          RESPONSE=$(printf "Content-Length: %d\r\n\r\n%s" "$LEN" "$REQUEST" | timeout 5 ./target/debug/sandbox-mcp 2>/dev/null)
          echo "$RESPONSE" | grep -q 'safe.*false' || { echo "❌ Scan should detect threats"; exit 1; }
          echo "✅ sandbox_scan detects threats"

      - name: MCP sandbox_policy_check blocks network
        run: |
          REQUEST='{"jsonrpc":"2.0","method":"tools/call","params":{"name":"sandbox_policy_check","arguments":{"action":"network","category":"network"}},"id":4}'
          LEN=${#REQUEST}
          RESPONSE=$(printf "Content-Length: %d\r\n\r\n%s" "$LEN" "$REQUEST" | timeout 5 ./target/debug/sandbox-mcp 2>/dev/null)
          echo "$RESPONSE" | grep -q 'allowed.*false' || { echo "❌ Network should be blocked"; exit 1; }
          echo "✅ sandbox_policy_check blocks network"
